name: ci-cd

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11", "3.12" ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (basic syntax check)
        run: |
          python -m compileall -q agents tools workflows api models services config

      - name: Run tests
        env:
          OPENAI_API_KEY: sk-test-placeholder
          APP_ENV: test
        run: |
          pytest -q --maxfail=1 --disable-warnings

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            intelligent-investment-research:latest
            intelligent-investment-research:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Uncomment to push to Docker Hub
